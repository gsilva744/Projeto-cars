<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <a href="../index.html" class="btn-close">
        <span class="material-symbols-outlined">close</span>
    </a>

    <main>
        <section id="login">
            <div class="img">
                <img src="../img/lOGO-footer.png" alt="Logo">
            </div>

            <div class="formulario">
                <h1>Cadastro | BayreuthMobil</h1>
                <!--<p>Crie sua conta para fazer pedidos, salvar favoritos e acessar o ambiente da SalBurguer.</p>-->

                <form action="cadastro.js" method="post" autocomplete="on">

                    <div class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <input type="text" name="nome" id="inome" placeholder="Seu nome completo" required maxlength="40" autocomplete="name">
                        <label for="inome">Nome</label>
                    </div>

                    <div class="campo">
                        <span class="material-symbols-outlined">mail</span>
                        <input type="email" name="email" id="iemail" placeholder="Seu e-mail" required maxlength="40" autocomplete="email">
                        <label for="iemail">E-mail</label>
                    </div>

                    <div class="campo">
                        <span class="material-symbols-outlined">phone</span>
                        <input type="tel" name="telefone" id="itelefone" placeholder="Seu telefone" required maxlength="15" autocomplete="tel">
                        <label for="itelefone">Telefone</label>
                    </div>

                    <div class="campo">
                        <span class="material-symbols-outlined">key</span>
                        <input type="password" name="senha" id="isenha" placeholder="Crie uma senha" required minlength="8" maxlength="20" autocomplete="new-password">
                        <label for="isenha">Senha</label>
                    </div>

                    <div class="campo">
                        <span class="material-symbols-outlined">lock</span>
                        <input type="password" name="confirmar" id="iconfirmar" placeholder="Confirme a senha" required minlength="8" maxlength="20">
                        <label for="iconfirmar">Confirmar senha</label>
                    </div>

                    <input type="submit" value="Cadastrar" onclick="alert('Fora de funcionamento...')">

                    <p class="cadastro">
                        Já tem conta? <a href="login.html">Entrar</a>
                    </p>

                </form>
            </div>
        </section>
    </main>
</body>
</html>
