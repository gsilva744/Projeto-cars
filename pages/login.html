<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <a href="../index.html" class="btn-close">
        <span
        class="material-symbols-outlined">close</span>
    </a>
    <main>
        
        <section id="login">
            <div class="img">
                <img src="../img/lOGO-footer.png" alt="">
            </div>
            <div class="formulario">
                <h1>Login | BayreuthMobil</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="login.js" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <input type="email" name="login" id="ilogin" placeholder="Seu email" size="19px" required maxlength="30" autocomplete="email">
                        <label for="ilogin">Login</label>

                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">key</span>
                        <input type="password" name="senha" id="isenha" placeholder="Sua senha" autocomplete="current-password" size="19px" minlength="8" maxlength="20" required>
                        <label for="isenha">Senha</label>
                    </div>
                    <input type="submit" value="Entrar" onclick="alert('Fora de Funcionamento...')">
                    <a href="" class="botao" onclick="alert('Fora de Funcionamento...')">
                        Esqueci a senha <span class="material-symbols-outlined">mail</span>
                    </a>
                    <p class="cadastro">Novo aqui? <a href="cadastro.html">Cadastre-se</a></p>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
